<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, get, update, onValue, remove, push, child }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "<api_key>",
    authDomain: "kniffel-48521.firebaseapp.com",
    databaseURL: "https://kniffel-48521-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "kniffel-48521",
    storageBucket: "kniffel-48521.firebasestorage.app",
    messagingSenderId: "993583803368",
    appId: "<app_id>",
    measurementId: "G-4YFEPP56X2"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // Firebase global verfügbar machen für die bestehenden Funktionen
  window.fbDb = db;
  window.fbRef = ref;
  window.fbSet = set;
  window.fbGet = get;
  window.fbUpdate = update;
  window.fbOnValue = onValue;
  window.fbRemove = remove;
</script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f4f8; color: #333; min-height: 100vh; }
  .screen { display: none; flex-direction: column; align-items: center; padding: 20px; }
  .screen.active { display: flex; }
  h1 { font-size: 2em; margin-bottom: 10px; }
  h2 { font-size: 1.3em; margin-bottom: 8px; }

  /* Startmenü */
  #menu { justify-content: center; min-height: 100vh; }
  #menu h1 { font-size: 2.5em; }
  .player-count { display: flex; gap: 10px; margin: 15px 0; }
  .player-count button { width: 50px; height: 50px; font-size: 1.3em; border: 2px solid #ccc; border-radius: 12px; background: white; cursor: pointer; }

  .name-inputs { display: flex; flex-direction: column; gap: 8px; margin: 10px 0; width: 100%; max-width: 250px; }

  .die.kept { background: #FFEB3B; border-color: #F9A825; }

  .btn-roll { background: #4CAF50; color: white; border: none; padding: 12px 30px; font-size: 1.1em; font-weight: bold; border-radius: 10px; cursor: pointer; }

  .scorecard td.preview { color: #1565C0; cursor: pointer; font-weight: bold; }
  .scorecard td.preview:hover { background: #bbdefb; }
  .scorecard td.active-player { background: #e8f0fe; }
  .scorecard td.scored { color: #333; }
  .scorecard td.last-scored { color: #D32F2F; }

  /* Status */

  /* Endscreen Bewertung */
  .end-rating { margin: 15px 0; text-align: center; }
  .end-stars { font-size: 2em; margin: 8px 0; }
  .end-comment { font-size: 1.1em; color: #555; }

  .score-scroll { width: 100%; overflow-x: auto; }

  /* Modus-Auswahl */
  .mode-select { display: flex; gap: 10px; margin: 15px 0; }
  .mode-select button { padding: 12px 24px; font-size: 1em; font-weight: bold; border: 2px solid #ccc; border-radius: 12px; background: white; cursor: pointer; }
  .mode-select button.selected { background: #1565C0; color: white; border-color: #1565C0; }

  /* Lobby */
  #lobby { justify-content: center; min-height: 100vh; }
  .lobby-code { font-size: 2em; font-weight: bold; letter-spacing: 6px; color: #1565C0; margin: 15px 0; }
  .lobby-input { padding: 12px; font-size: 1.2em; border: 2px solid #ccc; border-radius: 10px; text-align: center; letter-spacing: 4px; text-transform: uppercase; width: 200px; }
  .lobby-players { margin: 15px 0; font-size: 1.1em; }
  .lobby-players div { margin: 4px 0; }
  .btn-lobby { background: #1565C0; color: white; border: none; padding: 12px 30px; font-size: 1.1em; font-weight: bold; border-radius: 10px; cursor: pointer; margin: 8px; }
  .btn-lobby:disabled { background: #aaa; }
  .btn-back { background: #888; color: white; border: none; padding: 10px 24px; font-size: 1em; border-radius: 10px; cursor: pointer; margin-top: 15px; }

  /* Bestenliste */
  #leaderboard { justify-content: flex-start; min-height: 100vh; padding-top: 40px; }
  .lb-table { width: 100%; max-width: 400px; border-collapse: collapse; margin: 15px 0; font-size: 0.95em; }
  .lb-table th, .lb-table td { padding: 8px 10px; text-align: left; border-bottom: 1px solid #e0e0e0; }

  .lb-table td:nth-child(4) { font-size: 0.8em; color: #888; }
  .lb-table tr:nth-child(-n+3) td:nth-child(1) { font-size: 1.2em; }
  .btn-menu { background: #4CAF50; color: white; border: none; padding: 12px 30px; font-size: 1.1em; font-weight: bold; border-radius: 10px; cursor: pointer; margin: 8px; }
  .btn-leaderboard { background: #FF9800; color: white; border: none; padding: 10px 40px; font-size: 1em; font-weight: bold; border-radius: 12px; cursor: pointer; margin-top: 10px; width: 100%; max-width: 250px; }
</style>

<script>
// Sound-Engine (Web Audio API, keine externen Dateien)
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playTone(freq, duration, type='sine', vol=0.15) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function sndClick() { playTone(600, 0.08, 'sine', 0.12); }
function sndRoll() {
  for (let i = 0; i < 5; i++) setTimeout(() => playTone(200 + Math.random()*300, 0.06, 'triangle', 0.1), i * 40);
}
function sndKeep() { playTone(880, 0.1, 'sine', 0.1); }
function sndScore() { playTone(523, 0.12, 'sine', 0.15); setTimeout(() => playTone(659, 0.12, 'sine', 0.15), 100); setTimeout(() => playTone(784, 0.15, 'sine', 0.15), 200); }

function sndStart() { [523,659,784,1047].forEach((f,i) => setTimeout(() => playTone(f, 0.15, 'sine', 0.13), i*100)); }
function sndEnd() { [784,659,784,1047].forEach((f,i) => setTimeout(() => playTone(f, 0.25, 'triangle', 0.15), i*150)); }

function sndMyTurn() { playTone(523, 0.15, 'sine', 0.13); setTimeout(() => playTone(784, 0.2, 'sine', 0.13), 150); }

const DICE_FACES = ['','⚀','⚁','⚂','⚃','⚄','⚅'];
const UPPER = ['Einser','Zweier','Dreier','Vierer','Fünfer','Sechser'];
const LOWER = ['Dreierpasch','Viererpasch','Full House','Kleine Straße','Große Straße','Kniffel','Chance'];
const ALL = [...UPPER, ...LOWER];
const ZAHL = {Einser:1,Zweier:2,Dreier:3,Vierer:4,Fünfer:5,Sechser:6};

let numPlayers = 1, playerNames = [], scorecards = [];
let currentPlayer = 0, round = 1, dice = [0,0,0,0,0], kept = [false,false,false,false,false], rolls = 0;
let gameMode = 'local'; // 'local' oder 'online'
let roomCode = null, myPlayerId = null, isHost = false;
let lastScoredEntry = null; // { player: index, category: name }

// Startmenü
function initMenu() {
  const pc = document.getElementById('playerCount');
  pc.innerHTML = '';
  for (let n = 1; n <= 4; n++) {
    const b = document.createElement('button');
    b.textContent = n;
    b.className = n === 1 ? 'selected' : '';
    b.onclick = () => { sndClick(); numPlayers = n; document.querySelectorAll('.player-count button').forEach(x => x.className = ''); b.className = 'selected'; updateNameInputs(); };
    pc.appendChild(b);
  }
  updateNameInputs();
}

function updateNameInputs() {
  const c = document.getElementById('nameInputs');
  c.innerHTML = '';
  for (let i = 0; i < numPlayers; i++) {
    const inp = document.createElement('input');
    inp.placeholder = `Spieler ${i+1}`;
    inp.value = `Spieler ${i+1}`;
    inp.onfocus = () => { if (/^Spieler(\s\d+)?$/.test(inp.value)) inp.value = ''; };
    inp.id = `name${i}`;
    c.appendChild(inp);
  }
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showMenu() {
  numPlayers = 1;
  gameMode = 'local';
  window._leaderboardSaved = false;
  if (fbListener) { fbListener(); fbListener = null; }
  showScreen('menu');
  initMenu();
}

// Spiel starten
function startGame() {
  playerNames = [];
  scorecards = [];
  for (let i = 0; i < numPlayers; i++) {
    playerNames.push(document.getElementById(`name${i}`).value.trim() || `Spieler ${i+1}`);
    scorecards.push({});
  }
  currentPlayer = Math.floor(Math.random() * numPlayers);
  round = 1;
  newTurn();
}

function newTurn() {
  dice = [0,0,0,0,0];
  kept = [false,false,false,false,false];
  rolls = 0;
  showScreen('game');
  renderAll();
  setStatus(`${playerNames[currentPlayer]} ist dran – würfle!`);
}

// Würfeln
function roll() {
  if (rolls >= 3) return;
  if (gameMode === 'online' && currentPlayer !== myPlayerId) return;
  sndRoll();
  for (let i = 0; i < 5; i++) {
    if (!kept[i]) dice[i] = Math.floor(Math.random() * 6) + 1;
  }
  rolls++;
  if (gameMode === 'online') {
    fbUpdate(fbRef(fbDb, `games/${roomCode}`), { dice, rolls });
  } else {
    renderAll();
    setStatus('Würfel anklicken zum Behalten, dann erneut würfeln oder Kategorie wählen.');
  }
}

function toggleKeep(i) {
  if (rolls === 0) return;
  if (gameMode === 'online' && currentPlayer !== myPlayerId) return;
  sndKeep();
  kept[i] = !kept[i];
  if (gameMode === 'online') {
    fbUpdate(fbRef(fbDb, `games/${roomCode}`), { kept });
  } else {
    renderDice();
  }
}

// Gesamtbewertung am Spielende (Max: 375)
function rateTotal(gesamt) {
  if (gesamt >= 300) return { stars: '⭐⭐⭐⭐⭐', comment: 'Legendär! Absolute Weltklasse! 🔥' };
  if (gesamt >= 250) return { stars: '⭐⭐⭐⭐⭐', comment: 'Herausragend! Kniffel-Meister!' };
  if (gesamt >= 200) return { stars: '⭐⭐⭐⭐', comment: 'Sehr stark gespielt!' };
  if (gesamt >= 150) return { stars: '⭐⭐⭐', comment: 'Gutes Spiel, solide Leistung!' };
  if (gesamt >= 100) return { stars: '⭐⭐', comment: 'Geht so – da ist noch Luft nach oben.' };
  if (gesamt >= 50)  return { stars: '⭐', comment: 'Naja, das Glück war nicht auf deiner Seite.' };
  return { stars: '💀', comment: 'Uff... nächstes Mal wird besser!' };
}

// Kategorie wählen
function chooseCategory(kat) {
  if (rolls === 0 || kat in scorecards[currentPlayer]) return;
  if (gameMode === 'online' && currentPlayer !== myPlayerId) return;
  sndScore();
  scorecards[currentPlayer][kat] = calcScore(dice, kat);
  lastScoredEntry = { player: currentPlayer, category: kat };

  let nextPlayer = currentPlayer + 1;
  let nextRound = round;
  if (nextPlayer >= numPlayers) {
    nextPlayer = 0;
    nextRound++;
  }

  if (gameMode === 'online') {
    const players = playerNames.map((n, idx) => ({ name: n, scores: scorecards[idx] }));
    fbUpdate(fbRef(fbDb, `games/${roomCode}`), {
      players,
      currentPlayer: nextPlayer,
      round: nextRound,
      dice: [0,0,0,0,0],
      kept: [false,false,false,false,false],
      rolls: 0,
      lastScored: { player: currentPlayer, category: kat }
    });
  } else {
    currentPlayer = nextPlayer;
    round = nextRound;
    if (round > 13) {
      showEnd();
    } else {
      newTurn();
    }
  }
}

// Punkte berechnen
function calcScore(d, kat) {
  const counts = {}, s = d.reduce((a,b) => a+b, 0);
  d.forEach(v => counts[v] = (counts[v]||0) + 1);
  const vals = Object.keys(counts).map(Number).sort((a,b) => a-b);
  const maxC = Math.max(...Object.values(counts));

  if (kat in ZAHL) { const z = ZAHL[kat]; return (counts[z]||0) * z; }
  if (kat === 'Dreierpasch') return maxC >= 3 ? s : 0;
  if (kat === 'Viererpasch') return maxC >= 4 ? s : 0;
  if (kat === 'Full House') { const cv = Object.values(counts).sort((a,b)=>a-b); return cv.length===2 && cv[0]===2 && cv[1]===3 ? 25 : 0; }
  if (kat === 'Kleine Straße') { for (const st of [1,2,3]) { if ([st,st+1,st+2,st+3].every(v => vals.includes(v))) return 30; } return 0; }
  if (kat === 'Große Straße') { const j = vals.join(','); return j==='1,2,3,4,5'||j==='2,3,4,5,6' ? 40 : 0; }
  if (kat === 'Kniffel') return maxC === 5 ? 50 : 0;
  if (kat === 'Chance') return s;
  return 0;
}

function getTotal(si) {
  const sc = scorecards[si];
  let oben = 0, unten = 0;
  UPPER.forEach(k => { if (k in sc) oben += sc[k]; });
  LOWER.forEach(k => { if (k in sc) unten += sc[k]; });
  const bonus = oben >= 63 ? 35 : 0;
  return { oben, bonus, unten, gesamt: oben + bonus + unten };
}

// Rendering
function renderAll() {
  renderDice();
  renderScorecard();
  document.getElementById('currentPlayer').textContent = `🎯 ${playerNames[currentPlayer]}`;
  document.getElementById('roundInfo').textContent = `Runde ${round} / 13`;
  document.getElementById('rollsLeft').textContent = `Würfe übrig: ${3 - rolls}`;
  document.getElementById('btnRoll').disabled = rolls >= 3;
}

function renderDice() {
  const row = document.getElementById('diceRow');
  row.innerHTML = '';
  for (let i = 0; i < 5; i++) {
    const div = document.createElement('div');
    div.className = 'die' + (kept[i] ? ' kept' : '') + (dice[i] === 0 ? ' empty' : '');
    div.textContent = dice[i] === 0 ? '?' : DICE_FACES[dice[i]];
    div.onclick = () => toggleKeep(i);
    row.appendChild(div);
  }
}

function renderScorecard() {
  const table = document.getElementById('scorecard');
  let html = '<tr><th></th>';
  for (let si = 0; si < numPlayers; si++) {
    const cls = si === currentPlayer ? 'style="color:#1565C0"' : '';
    html += `<th ${cls}>${playerNames[si]}</th>`;
  }
  html += '</tr>';

  html += sectionRow('── Oberer Block ──');
  UPPER.forEach(k => { html += categoryRow(k); });
  html += bonusRow();
  html += sectionRow('── Unterer Block ──');
  LOWER.forEach(k => { html += categoryRow(k); });
  html += totalRow();

  table.innerHTML = html;
}

function sectionRow(label) {
  return `<tr class="section-header"><td colspan="${numPlayers+1}">${label}</td></tr>`;
}

function categoryRow(kat) {
  let html = `<tr><td>${kat}</td>`;
  for (let si = 0; si < numPlayers; si++) {
    const sc = scorecards[si];
    if (kat in sc) {
      const isLast = lastScoredEntry && lastScoredEntry.player === si && lastScoredEntry.category === kat;
      html += `<td class="scored${isLast ? ' last-scored' : ''}">${sc[kat]}</td>`;
    } else if (si === currentPlayer && rolls > 0 && (gameMode === 'local' || si === myPlayerId)) {
      const preview = calcScore(dice, kat);
      html += `<td class="preview" onclick="chooseCategory('${kat}')">(${preview})</td>`;
    } else {
      html += `<td>-</td>`;
    }
  }
  html += '</tr>';
  return html;
}

function bonusRow() {
  let html = '<tr class="bonus-row"><td>Bonus (≥63)</td>';
  for (let si = 0; si < numPlayers; si++) {
    const t = getTotal(si);
    html += `<td>${t.bonus ? '35' : `(${t.oben}/63)`}</td>`;
  }
  html += '</tr>';
  return html;
}

function totalRow() {
  let html = '<tr class="total-row"><td>GESAMT</td>';
  for (let si = 0; si < numPlayers; si++) {
    html += `<td>${getTotal(si).gesamt}</td>`;
  }
  html += '</tr>';
  return html;
}

function setStatus(text) {
  document.getElementById('status').textContent = text;
}

// Endscreen
function showEnd() {
  showScreen('end');
  sndEnd();
  // Online-Raum nach 60s löschen
  if (gameMode === 'online' && roomCode) {
    if (fbListener) { fbListener(); fbListener = null; }
    setTimeout(() => {
      fbRemove(fbRef(fbDb, `games/${roomCode}`));
      roomCode = null;
    }, 60000);
  }
  const res = playerNames.map((n, i) => ({ name: n, score: getTotal(i).gesamt }));
  res.sort((a, b) => b.score - a.score);
  // Scores in Bestenliste speichern (lokal immer, online nur Host)
  if (gameMode === 'local' || isHost) {
    function saveToLeaderboard() {
      if (!window.fbDb) { setTimeout(saveToLeaderboard, 500); return; }
      res.forEach(r => {
        if (/^Spieler(\s\d+)?$/.test(r.name) || !r.name.trim()) return;
        const entry = {
          name: r.name,
          score: r.score,
          date: new Date().toLocaleString('de-DE')
        };
        const newRef = fbRef(fbDb, 'leaderboard/' + Date.now() + '_' + Math.random().toString(36).substr(2, 5));
        fbSet(newRef, entry);
      });
    }
    saveToLeaderboard();
  }
  const div = document.getElementById('results');
  div.innerHTML = '';
  res.forEach((r, i) => {
    const d = document.createElement('div');
    d.className = 'result' + (i === 0 ? ' winner' : '');
    d.textContent = (i === 0 ? '👑 ' : `${i+1}. `) + `${r.name}: ${r.score} Punkte`;
    div.appendChild(d);

    const rating = rateTotal(r.score);
    const rd = document.createElement('div');
    rd.className = 'end-rating';
    rd.innerHTML = `<div class="end-stars">${rating.stars}</div><div class="end-comment">${rating.comment}</div>`;
    div.appendChild(rd);
  });
}

// Modus-Auswahl
function selectMode(mode) {
  gameMode = mode;
  document.querySelectorAll('.mode-select button').forEach(b => b.classList.remove('selected'));
  event.target.classList.add('selected');
  document.getElementById('localSetup').style.display = mode === 'local' ? '' : 'none';
  document.getElementById('onlineSetup').style.display = mode === 'online' ? '' : 'none';
}

let fbListener = null;

function createOnlineGame() {
  roomCode = Math.random().toString(36).substring(2, 8).toUpperCase();
  isHost = true;
  myPlayerId = 0;
  const name = document.getElementById('onlineName').value.trim() || 'Spieler';
  const roomRef = fbRef(fbDb, `games/${roomCode}`);
  fbSet(roomRef, {
    status: 'waiting',
    createdAt: Date.now(),
    players: [{ name, scores: {} }]
  }).then(() => {
    showScreen('lobby');
    document.getElementById('lobbyCode').textContent = roomCode;
    listenLobby();
  }).catch(e => alert('Fehler: ' + e.message));
}

function joinOnlineGame() {
  roomCode = document.getElementById('joinCode').value.trim().toUpperCase();
  if (!roomCode || roomCode.length < 4) { alert('Bitte gültigen Code eingeben!'); return; }
  isHost = false;
  const name = document.getElementById('onlineName').value.trim() || 'Spieler';
  const roomRef = fbRef(fbDb, `games/${roomCode}`);
  fbGet(roomRef).then(snap => {
    if (!snap.exists()) { alert('Raum nicht gefunden!'); return; }
    const data = snap.val();
    if (data.status !== 'waiting') { alert('Spiel läuft bereits!'); return; }
    const players = data.players || [];
    if (players.length >= 4) { alert('Raum ist voll!'); return; }
    myPlayerId = players.length;
    players.push({ name, scores: {} });
    fbUpdate(roomRef, { players }).then(() => {
      showScreen('lobby');
      document.getElementById('lobbyCode').textContent = roomCode;
      listenLobby();
    });
  }).catch(e => alert('Fehler: ' + e.message));
}

function listenLobby() {
  if (fbListener) fbListener();
  const roomRef = fbRef(fbDb, `games/${roomCode}`);
  fbListener = fbOnValue(roomRef, snap => {
    const data = snap.val();
    if (!data) { showMenu(); return; }
    const players = data.players || [];
    const div = document.getElementById('lobbyPlayers');
    div.innerHTML = players.map((p, i) =>
      `<div>${i === 0 ? '👑' : '🎮'} ${p.name}${i === 0 ? ' (Host)' : ''}</div>`
    ).join('');
    document.getElementById('btnLobbyStart').disabled = !(isHost && players.length >= 2);
    if (data.status === 'playing') {
      startOnlineRound(data);
    }
  });
}

function startOnlineGame() {
  if (!isHost) return;
  const roomRef = fbRef(fbDb, `games/${roomCode}`);
  fbGet(roomRef).then(snap => {
    const data = snap.val();
    fbUpdate(roomRef, {
      status: 'playing',
      currentPlayer: Math.floor(Math.random() * data.players.length),
      round: 1,
      dice: [0,0,0,0,0],
      kept: [false,false,false,false,false],
      rolls: 0
    });
  });
}

function startOnlineRound(data) {
  const players = data.players || [];
  numPlayers = players.length;
  playerNames = players.map(p => p.name);
  scorecards = players.map(p => p.scores || {});
  currentPlayer = data.currentPlayer || 0;
  round = data.round || 1;
  dice = data.dice || [0,0,0,0,0];
  kept = data.kept || [false,false,false,false,false];
  rolls = data.rolls || 0;
  if (data.lastScored) lastScoredEntry = data.lastScored;
  if (round > 13) { showEnd(); if (fbListener) { fbListener(); fbListener = null; } return; }
  showScreen('game');
  renderAll();
  const isMyTurn = currentPlayer === myPlayerId;
  if (isMyTurn && rolls === 0) sndMyTurn();
  setStatus(isMyTurn ? 'Du bist dran – würfle!' : `${playerNames[currentPlayer]} ist dran...`);
  document.getElementById('btnRoll').disabled = !isMyTurn || rolls >= 3;
}

function listenGame() {
  if (fbListener) fbListener();
  const roomRef = fbRef(fbDb, `games/${roomCode}`);
  fbListener = fbOnValue(roomRef, snap => {
    const data = snap.val();
    if (!data) return;
    if (data.status === 'playing') startOnlineRound(data);
  });
}

function leaveLobby() {
  if (fbListener) { fbListener(); fbListener = null; }
  if (roomCode && isHost) fbRemove(fbRef(fbDb, `games/${roomCode}`));
  roomCode = null;
  showMenu();
}

let fbLeaderboardListener = null;

function showLeaderboard() {
  showScreen('leaderboard');
  const table = document.getElementById('lbTable');
  table.innerHTML = '<tr><th>#</th><th>Name</th><th>Punkte</th><th>Datum</th></tr><tr><td colspan="4" style="text-align:center;color:#888;">Laden...</td></tr>';
  if (!window.fbDb) { setTimeout(showLeaderboard, 500); return; }
  if (fbLeaderboardListener) fbLeaderboardListener();
  fbLeaderboardListener = fbOnValue(fbRef(fbDb, 'leaderboard'), snap => {
    if (!snap.exists()) {
      table.innerHTML = '<tr><th>#</th><th>Name</th><th>Punkte</th><th>Datum</th></tr><tr><td colspan="4" style="text-align:center;color:#888;">Noch keine Eintr\u00e4ge</td></tr>';
      return;
    }
    const entries = [];
    snap.forEach(child => entries.push(child.val()));
    entries.sort((a, b) => b.score - a.score);
    const top = entries.slice(0, 50);
    if (entries.length > 50) {
      const keys = [];
      snap.forEach(child => keys.push({ key: child.key, val: child.val() }));
      keys.sort((a, b) => b.val.score - a.val.score);
      keys.slice(50).forEach(k => fbRemove(fbRef(fbDb, `leaderboard/${k.key}`)));
    }
    const medals = ['🥇','🥈','🥉'];
    let html = '<tr><th>#</th><th>Name</th><th>Punkte</th><th>Datum</th></tr>';
    top.forEach((e, i) => {
      html += `<tr><td>${medals[i] || (i+1)}</td><td>${e.name}</td><td>${e.score}</td><td>${e.date}</td></tr>`;
    });
    table.innerHTML = html;
  });
}

// Alte Räume aufräumen (älter als 1 Stunde)
function cleanupOldRooms() {
  if (!window.fbDb) { setTimeout(cleanupOldRooms, 1000); return; }
  const gamesRef = fbRef(fbDb, 'games');
  fbGet(gamesRef).then(snap => {
    if (!snap.exists()) return;
    const now = Date.now();
    snap.forEach(child => {
      const data = child.val();
      if (!data.createdAt || now - data.createdAt > 3600000) {
        fbRemove(fbRef(fbDb, `games/${child.key}`));
      }
    });
  });
}
setTimeout(cleanupOldRooms, 2000);

// Init
initMenu();
</script>
</body>
</html>
